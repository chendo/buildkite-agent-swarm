{{- if .Values.cleanup.enabled }}
{{- if and .Values.cleanup.builds.enabled (not .Values.rbac.create) }}
{{- fail "cleanup.builds.enabled requires rbac.create=true so the cleanup pod can list pods on its node — without it, the kube API call returns 403 and the build-dir cleanup silently falls through to mtime-only deletion." }}
{{- end }}
{{- $name := include "fullname" . }}
{{- $buildsPath := .Values.cleanup.builds.path | default "/var/buildkite/builds" }}
{{- $maxAgeDays := int (.Values.cleanup.builds.maxAgeDays | default 14) }}
{{- $intervalSeconds := int (.Values.cleanup.intervalSeconds | default 86400) }}
apiVersion: {{ template "daemonset.apiVersion" . }}
kind: DaemonSet
metadata:
  name: {{ $name }}-cleanup
  labels:
    app: {{ $name }}-cleanup
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app: {{ $name }}-cleanup
  template:
    metadata:
      labels:
        app: {{ $name }}-cleanup
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
      serviceAccount: {{ template "fullname" . }}
      containers:
      - name: cleanup
        image: {{ .Values.cleanup.image | default "docker:24.0-cli" }}
        securityContext:
          # Must run as root: the DIND daemon (privileged, root) creates the
          # docker socket at /var/buildkite/docker/run/docker.sock with default
          # ownership root:root mode 0660, so a non-root UID gets EACCES on
          # connect(). The host group of the socket is also host-dependent so
          # we can't reliably set fsGroup either.
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        env:
          - name: DRY_RUN
            value: {{ .Values.cleanup.dryRun | default false | quote }}
          - name: CLEANUP_INTERVAL
            value: {{ $intervalSeconds | quote }}
          - name: BUILDS_MAX_AGE_DAYS
            value: {{ $maxAgeDays | quote }}
          - name: BUILDS_PATH
            value: {{ $buildsPath | quote }}
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          {{- if .Values.cleanup.docker.enabled }}
          - name: DOCKER_HOST
            value: unix:///var/buildkite/docker/run/docker.sock
          - name: CONTAINER_FILTER
            value: {{ .Values.cleanup.docker.containers.filter | default "" | quote }}
          - name: DANGLING_IMAGE_FILTER
            value: {{ .Values.cleanup.docker.danglingImages.filter | default "" | quote }}
          - name: UNUSED_IMAGE_FILTER
            value: {{ .Values.cleanup.docker.unusedImages.filter | default "" | quote }}
          - name: BUILD_CACHE_FILTER
            value: {{ .Values.cleanup.docker.buildCache.filter | default "" | quote }}
          - name: BUILD_CACHE_KEEP_STORAGE
            value: {{ .Values.cleanup.docker.buildCache.keepStorage | default "" | quote }}
          - name: VOLUME_FILTER
            value: {{ .Values.cleanup.docker.volumes.filter | default "" | quote }}
          {{- end }}
        resources:
{{ toYaml .Values.cleanup.resources | indent 10 }}
        command:
          - /bin/sh
          - -c
          - |
            if [ "$DRY_RUN" = "true" ]; then
              echo "*** DRY RUN MODE — no deletions will be performed ***"
            fi
            echo "Cleanup loop starting, interval=${CLEANUP_INTERVAL}s"
            while true; do
              echo "--- Cleanup run at $(date -Iseconds) ---"

              # Disk usage summary
              echo "Disk usage:"
              df -h "$BUILDS_PATH" 2>/dev/null || true
              {{- if .Values.cleanup.docker.enabled }}
              if [ -S "/var/buildkite/docker/run/docker.sock" ]; then
                echo "Docker disk usage:"
                docker system df 2>/dev/null || true
              fi
              {{- end }}

              {{- if .Values.cleanup.builds.enabled }}
              # Build directory cleanup — remove dirs for pods that no longer exist
              echo "Checking for orphaned build dirs (older than ${BUILDS_MAX_AGE_DAYS} days, pod no longer active)..."
              APISERVER="https://kubernetes.default.svc"
              CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              SA_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || true)"
              if [ -z "$SA_TOKEN" ]; then
                echo "No service account token found, skipping build dir cleanup"
              else
                NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
                api_response="$(wget -qO- --header="Authorization: Bearer $SA_TOKEN" \
                  --ca-certificate="$CACERT" \
                  "${APISERVER}/api/v1/namespaces/${NAMESPACE}/pods?fieldSelector=spec.nodeName=${NODE_NAME}" 2>/dev/null)"
                # Bail if the response doesn't look like a PodList. Without this
                # guard, a transient API error leaves active_pods empty, the
                # suffix check matches nothing, and the mtime branch deletes
                # every dir older than maxAgeDays — the safety net stops being
                # a safety net if it's the only net.
                if ! echo "$api_response" | grep -q '"kind":"PodList"'; then
                  echo "WARNING: failed to fetch pod list from kube API; skipping build dir cleanup this run"
                else
                  # K8s emits compact single-line JSON; greedy sed would capture
                  # at most one "name" per line. grep -oE finds every match. The
                  # API serializes pod metadata with "name" as the first field,
                  # so "metadata":{"name":"X" reliably brackets the pod's own
                  # name (not container/volume/ownerReference "name" fields).
                  active_pods="$(echo "$api_response" \
                    | grep -oE '"metadata":[{]"name":"[^"]+"' \
                    | sed 's/.*"name":"//;s/"$//' \
                    | sort -u)"
                  for dir in "$BUILDS_PATH"/*/; do
                    [ -d "$dir" ] || continue
                    dir_name="$(basename "$dir")"
                    # Extract pod suffix (last 5 chars) from agent name <node>-<queue>-<suffix>
                    pod_suffix="$(echo "$dir_name" | sed 's/.*-\(.....\)$/\1/')"
                    # Check if any active pod name ends with this suffix
                    if echo "$active_pods" | grep -q ".\{1,\}${pod_suffix}$"; then
                      continue
                    fi
                    # Also require the dir to be older than maxAgeDays as a safety net
                    if find "$dir" -maxdepth 0 -mtime +"$BUILDS_MAX_AGE_DAYS" | grep -q .; then
                      if [ "$DRY_RUN" = "true" ]; then
                        echo "[dry-run] Would delete orphaned dir: $dir"
                      else
                        echo "Deleting orphaned dir: $dir"
                        rm -rf "$dir"
                      fi
                    fi
                  done
                fi
              fi
              {{- end }}

              {{- if .Values.cleanup.docker.enabled }}
              # Docker cleanup
              if [ -S "/var/buildkite/docker/run/docker.sock" ]; then

                {{- if .Values.cleanup.docker.containers.enabled }}
                echo "Pruning stopped containers..."
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[dry-run] Exited containers (filter: ${CONTAINER_FILTER:-none}):"
                  docker container ls -a --filter status=exited 2>&1 || true
                else
                  docker container prune -f ${CONTAINER_FILTER:+--filter "$CONTAINER_FILTER"} 2>&1 || true
                fi
                {{- end }}

                {{- if .Values.cleanup.docker.danglingImages.enabled }}
                echo "Pruning dangling images..."
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[dry-run] Dangling images (filter: ${DANGLING_IMAGE_FILTER:-none}):"
                  docker image ls --filter dangling=true 2>&1 || true
                else
                  docker image prune -f ${DANGLING_IMAGE_FILTER:+--filter "$DANGLING_IMAGE_FILTER"} 2>&1 || true
                fi
                {{- end }}

                {{- if .Values.cleanup.docker.unusedImages.enabled }}
                echo "Pruning ALL unused images..."
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[dry-run] All images (filter: ${UNUSED_IMAGE_FILTER:-none}):"
                  docker image ls 2>&1 || true
                else
                  docker image prune -af ${UNUSED_IMAGE_FILTER:+--filter "$UNUSED_IMAGE_FILTER"} 2>&1 || true
                fi
                {{- end }}

                {{- if .Values.cleanup.docker.buildCache.enabled }}
                echo "Pruning build cache..."
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[dry-run] Build cache usage:"
                  docker builder du 2>&1 || true
                else
                  docker builder prune -f ${BUILD_CACHE_FILTER:+--filter "$BUILD_CACHE_FILTER"} ${BUILD_CACHE_KEEP_STORAGE:+--keep-storage "$BUILD_CACHE_KEEP_STORAGE"} 2>&1 || true
                fi
                {{- end }}

                {{- if .Values.cleanup.docker.volumes.enabled }}
                echo "Pruning unused volumes..."
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[dry-run] Volumes that would be pruned:"
                  docker volume ls -f dangling=true ${VOLUME_FILTER:+--filter "$VOLUME_FILTER"} 2>&1 || true
                else
                  docker volume prune -f ${VOLUME_FILTER:+--filter "$VOLUME_FILTER"} 2>&1 || true
                fi
                {{- end }}

              else
                echo "Docker socket not found, skipping docker cleanup"
              fi
              {{- end }}

              echo "--- Cleanup complete, sleeping ${CLEANUP_INTERVAL}s ---"
              sleep "$CLEANUP_INTERVAL"
            done
        volumeMounts:
        {{- if .Values.cleanup.builds.enabled }}
        - name: buildkite-builds
          mountPath: {{ $buildsPath | quote }}
        {{- end }}
        {{- if .Values.cleanup.docker.enabled }}
        - name: docker-socket
          mountPath: /var/buildkite/docker/run
        {{- end }}
      volumes:
      {{- if .Values.cleanup.builds.enabled }}
      - name: buildkite-builds
        hostPath:
          path: {{ $buildsPath | quote }}
          type: DirectoryOrCreate
      {{- end }}
      {{- if .Values.cleanup.docker.enabled }}
      - name: docker-socket
        hostPath:
          path: /var/buildkite/docker/run
          type: DirectoryOrCreate
      {{- end }}
{{- end }}
